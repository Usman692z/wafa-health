name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Install Capacitor packages
        run: npm install --save-dev @capacitor/cli @capacitor/core @capacitor/android

      - name: Patch next.config.ts for static export
        run: |
          python3 -c "
          content = '''import type { NextConfig } from \"next\";

          const nextConfig: NextConfig = {
            output: \"export\",
            trailingSlash: true,
            images: {
              unoptimized: true,
              remotePatterns: [
                { protocol: \"https\", hostname: \"firebasestorage.googleapis.com\" },
                { protocol: \"https\", hostname: \"lh3.googleusercontent.com\" },
                { protocol: \"https\", hostname: \"storage.googleapis.com\" },
              ],
            },
            experimental: {
              optimizePackageImports: [\"lucide-react\", \"framer-motion\", \"chart.js\"],
            },
            compress: true,
            poweredByHeader: false,
          };

          export default nextConfig;
          '''
          with open('next.config.ts', 'w') as f:
              f.write(content)
          "

      - name: Build Next.js static export
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Initialize Capacitor and add Android
        run: |
          npx cap add android
          npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediGO-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
